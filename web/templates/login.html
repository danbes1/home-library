<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Домашняя библиотека</title>
    <script src="/static/tailwind.min.js"></script>
</head>
<body class="bg-gray-50 flex min-h-screen items-center justify-center p-4">

    <div class="w-full max-w-md bg-white p-8 rounded-3xl border border-gray-200 shadow-xs">
        <div class="text-center mb-8">
            <span class="text-4xl">📚</span>
            <h1 class="text-2xl font-bold text-gray-900 mt-3">Наша библиотека</h1>
            <p class="text-sm text-gray-500 mt-1">Войдите, чтобы управлять книгами семьи</p>
        </div>

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required 
                       class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                <input type="password" id="password" name="password" required 
                       class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm">
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition-colors cursor-pointer text-sm">
                Войти
            </button>
        </form>
    </div>

</body>
</html>
