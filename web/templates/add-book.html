{{define "title"}}Добавить книгу{{end}}

{{define "content"}}
<div class="max-w-xl mx-auto bg-white p-6 rounded-2xl border border-gray-200">
    <div class="mb-6">
        <h2 class="text-xl font-bold text-gray-900">Добавление книги вручную</h2>
        <p class="text-xs text-gray-500 mt-1">Заполните поля, чтобы поставить книгу на семейную полку</p>
    </div>

    <form action="/books" method="POST" class="space-y-4">
        <div>
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Название книги</label>
            <input type="text" id="title" name="title" required 
                   class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm">
        </div>

        <div>
            <label for="authors" class="block text-sm font-medium text-gray-700 mb-1">Авторы (через запятую)</label>
            <input type="text" id="authors" name="authors" placeholder="Алан Донован, Брайан Керниган" required 
                   class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm">
        </div>

        <div>
            <label for="isbn" class="block text-sm font-medium text-gray-700 mb-1">ISBN (необязательно)</label>
            <input type="text" id="isbn" name="isbn" 
                   class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm">
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Описание / Заметки</label>
            <textarea id="description" name="description" rows="3" 
                      class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm"></textarea>
        </div>

        <div class="flex gap-3 pt-2">
            <a href="/" class="w-1/2 text-center border border-gray-300 text-gray-700 font-medium py-3 rounded-xl hover:bg-gray-50 transition-colors text-sm">
                Отмена
            </a>
            <button type="submit" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition-colors cursor-pointer text-sm">
                Сохранить
            </button>
        </div>
    </form>
</div>
{{end}}
