{{define "base"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{template "title" .}} — Домашняя библиотека</title>

    <script src="/static/tailwind.min.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icon.png">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased pb-16 md:pb-0">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-40 hidden md:block">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-indigo-600">📚 Моя Библиотека</h1>
            <nav class="flex space-x-4">
                <a href="/" class="text-gray-600 hover:text-indigo-600 font-medium">Книги</a>
                <a href="/logout" class="text-red-500 hover:text-red-600 font-medium">Выйти</a>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">
        {{template "content" .}}
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 h-16 flex justify-around items-center z-50">
        <a href="/" class="flex flex-col items-center text-indigo-600">
            <span class="text-xl">📖</span>
            <span class="text-xs">Книги</span>
        </a>
        <a href="/logout" class="flex flex-col items-center text-gray-400">
            <span class="text-xl">🚪</span>
            <span class="text-xs">Выход</span>
        </a>
    </nav>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
{{end}}
